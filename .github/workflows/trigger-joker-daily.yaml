name: Trigger Joker Daily

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  issues: write

jobs:
  trigger-joker:
    name: Trigger joker agent
    runs-on: ubuntu-latest
    steps:
      - name: Open daily joker trigger issue
        uses: actions/github-script@v7
        with:
          script: |
            const now = new Date().toISOString().slice(0, 10);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Daily joker trigger ${now}`,
              body: [
                '@copilot',
                '',
                'Use the `joker` agent.',
                '',
                'Create a new issue in this repository with a joke.'
              ].join('\n')
            });
